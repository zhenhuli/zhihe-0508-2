<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图片处理工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>在线图片处理工具</h1>
            <p class="subtitle">支持裁剪、调色阶、添加水印、格式转换和压缩</p>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <div class="upload-section">
                    <label class="upload-btn" for="imageInput">
                        <span class="upload-icon">+</span>
                        <span>上传图片</span>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>

                <div id="controls" class="controls" style="display: none;">
                    <div class="control-section">
                        <h3>裁剪设置</h3>
                        <div class="control-group">
                            <label>裁剪模式</label>
                            <select id="cropMode">
                                <option value="free">自由裁剪</option>
                                <option value="1:1">1:1</option>
                                <option value="4:3">4:3</option>
                                <option value="16:9">16:9</option>
                                <option value="3:4">3:4</option>
                                <option value="9:16">9:16</option>
                            </select>
                        </div>
                        <button id="applyCrop" class="btn btn-secondary">应用裁剪</button>
                    </div>

                    <div class="control-section">
                        <h3>色阶调整</h3>
                        <div class="control-group">
                            <label>亮度: <span id="brightnessValue">1.0</span></label>
                            <input type="range" id="brightness" min="0.1" max="2" step="0.1" value="1">
                        </div>
                        <div class="control-group">
                            <label>对比度: <span id="contrastValue">1.0</span></label>
                            <input type="range" id="contrast" min="0.1" max="2" step="0.1" value="1">
                        </div>
                        <div class="control-group">
                            <label>饱和度: <span id="saturationValue">1.0</span></label>
                            <input type="range" id="saturation" min="0" max="2" step="0.1" value="1">
                        </div>
                    </div>

                    <div class="control-section">
                        <h3>文字水印</h3>
                        <div class="control-group">
                            <label>水印文字</label>
                            <input type="text" id="watermarkText" placeholder="输入水印文字">
                        </div>
                        <div class="control-group">
                            <label>字体大小</label>
                            <input type="number" id="watermarkSize" value="32" min="12" max="120">
                        </div>
                        <div class="control-group">
                            <label>颜色</label>
                            <input type="color" id="watermarkColor" value="#ffffff">
                        </div>
                    </div>

                    <div class="control-section">
                        <h3>导出设置</h3>
                        <div class="control-group">
                            <label>输出格式</label>
                            <select id="outputFormat">
                                <option value="jpeg">JPEG</option>
                                <option value="png">PNG</option>
                                <option value="webp">WebP</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>质量: <span id="qualityValue">80</span>%</label>
                            <input type="range" id="quality" min="10" max="100" step="5" value="80">
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="processBtn" class="btn btn-primary">处理并下载</button>
                        <button id="resetBtn" class="btn btn-secondary">重置</button>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div id="previewContainer" class="preview-container">
                    <div class="placeholder">
                        <p>请上传图片开始处理</p>
                    </div>
                </div>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>处理中...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
