<!doctype html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>3D Waves Background</title>
  </head>
  <body class="bg-white dark:bg-gray-900 transition-colors duration-500">
    <div id="canvas-container"></div>
    
    <div class="relative z-10 w-full h-full flex flex-col items-center justify-center p-4">
      <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold text-gray-800 dark:text-white mb-4 text-center transition-colors duration-500">
        3D Waves
      </h1>
      <p class="text-lg md:text-xl text-gray-600 dark:text-gray-300 mb-8 text-center transition-colors duration-500">
        动态波浪背景展示
      </p>
      
      <div class="control-panel bg-white/70 dark:bg-gray-800/70 rounded-2xl p-6 shadow-2xl w-full max-w-sm transition-colors duration-500">
        <div class="space-y-6">
          <div>
            <div class="flex justify-between mb-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">波浪高度</label>
              <span id="height-value" class="text-sm text-gray-500 dark:text-gray-400">1.0</span>
            </div>
            <input type="range" id="wave-height" min="0.1" max="3" step="0.1" value="1" class="w-full text-blue-500 dark:text-blue-400">
          </div>
          
          <div>
            <div class="flex justify-between mb-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">波纹密度</label>
              <span id="density-value" class="text-sm text-gray-500 dark:text-gray-400">1.0</span>
            </div>
            <input type="range" id="wave-density" min="0.5" max="3" step="0.1" value="1" class="w-full text-green-500 dark:text-green-400">
          </div>
          
          <div>
            <div class="flex justify-between mb-2">
              <label class="text-sm font-medium text-gray-700 dark:text-gray-300">流动速度</label>
              <span id="speed-value" class="text-sm text-gray-500 dark:text-gray-400">1.0</span>
            </div>
            <input type="range" id="wave-speed" min="0.1" max="3" step="0.1" value="1" class="w-full text-purple-500 dark:text-purple-400">
          </div>
          
          <div class="pt-4 border-t border-gray-200 dark:border-gray-700">
            <button id="theme-toggle" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all duration-300">
              <span id="theme-icon" class="text-xl">🌙</span>
              <span id="theme-text" class="font-medium text-gray-700 dark:text-gray-300">切换深色主题</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
