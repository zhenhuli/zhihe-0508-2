<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线文本分析工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">在线文本分析工具</h1>
            <p class="text-gray-600">词频统计 · 字数字符统计 · 敏感词检测</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-6">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">输入文本</h2>
                    <div class="relative">
                        <textarea 
                            id="textInput" 
                            class="w-full h-48 p-4 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                            placeholder="请输入要分析的文本内容...&#10;&#10;示例：人工智能正在改变我们的生活方式。AI技术的发展日新月异，机器学习和深度学习在各个领域都取得了显著的成果。未来，人工智能将继续深入到我们生活的方方面面，为人类社会带来更多的便利和创新。"
                        ></textarea>
                    </div>
                    
                    <div class="mt-4">
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-medium text-gray-700">自定义敏感词（可选，用逗号分隔）</label>
                            <button 
                                id="showSensitiveListBtn" 
                                class="text-sm text-primary-600 hover:text-primary-700 hover:underline transition-colors flex items-center gap-1"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                                </svg>
                                查看常见敏感词库
                            </button>
                        </div>
                        <input 
                            type="text" 
                            id="customSensitiveWords" 
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                            placeholder="例如：测试,示例,关键词"
                        >
                    </div>

                    <div class="mt-6 flex gap-4">
                        <button 
                            id="analyzeBtn" 
                            class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
                        >
                            开始分析
                        </button>
                        <button 
                            id="clearBtn" 
                            class="px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-50 transition-all duration-200"
                        >
                            清空
                        </button>
                    </div>
                </div>

                <div id="resultSection" class="hidden space-y-6">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-semibold text-gray-800">原文预览（敏感词高亮）</h2>
                            <div id="highlightLegend" class="hidden text-sm">
                                <span class="inline-flex items-center gap-1">
                                    <span class="w-3 h-3 bg-yellow-200 border border-yellow-400 rounded"></span>
                                    <span class="text-gray-600">敏感词</span>
                                </span>
                            </div>
                        </div>
                        <div id="highlightedText" class="w-full min-h-32 max-h-48 overflow-y-auto p-4 bg-gray-50 border border-gray-200 rounded-lg text-gray-800 whitespace-pre-wrap break-words leading-relaxed">
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4">统计概览</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4 text-center">
                                <div id="statWords" class="text-2xl font-bold text-primary-600">0</div>
                                <div class="text-sm text-gray-600">词汇数</div>
                            </div>
                            <div class="bg-gradient-to-br from-green-50 to-green-100 rounded-lg p-4 text-center">
                                <div id="statSentences" class="text-2xl font-bold text-green-600">0</div>
                                <div class="text-sm text-gray-600">句子数</div>
                            </div>
                            <div class="bg-gradient-to-br from-purple-50 to-purple-100 rounded-lg p-4 text-center">
                                <div id="statParagraphs" class="text-2xl font-bold text-purple-600">0</div>
                                <div class="text-sm text-gray-600">段落数</div>
                            </div>
                            <div class="bg-gradient-to-br from-orange-50 to-orange-100 rounded-lg p-4 text-center">
                                <div id="statChars" class="text-2xl font-bold text-orange-600">0</div>
                                <div class="text-sm text-gray-600">总字符数</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4">字符类型分布</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">中文字符</span>
                                    <span id="statChinese" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barChinese" class="bg-red-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">英文字符</span>
                                    <span id="statEnglish" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barEnglish" class="bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">数字</span>
                                    <span id="statNumbers" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barNumbers" class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">空格</span>
                                    <span id="statSpaces" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barSpaces" class="bg-yellow-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">标点符号</span>
                                    <span id="statPunctuation" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barPunctuation" class="bg-purple-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="border rounded-lg p-3">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-sm text-gray-600">其他字符</span>
                                    <span id="statOther" class="font-semibold text-gray-800">0</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="barOther" class="bg-gray-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                        <div class="h-64">
                            <canvas id="charTypeChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div id="rightSection" class="hidden space-y-6">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">词频统计 Top 15</h2>
                        <select id="wordCountSelect" class="border border-gray-300 rounded-lg px-3 py-1 text-sm">
                            <option value="10">Top 10</option>
                            <option value="15" selected>Top 15</option>
                            <option value="20">Top 20</option>
                            <option value="30">Top 30</option>
                        </select>
                    </div>
                    <div class="h-80">
                        <canvas id="wordFrequencyChart"></canvas>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">高频词列表</h2>
                    <div id="wordList" class="max-h-64 overflow-y-auto space-y-2">
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold text-gray-800">敏感词检测</h2>
                        <span id="sensitiveStatus" class="px-3 py-1 rounded-full text-sm font-medium">
                        </span>
                    </div>
                    <div id="sensitiveResult">
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl p-8 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary-600 border-t-transparent mb-4"></div>
                <p class="text-gray-700 font-medium">正在分析文本...</p>
            </div>
        </div>

        <div id="sensitiveWordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col">
                <div class="flex items-center justify-between p-6 border-b border-gray-200">
                    <div>
                        <h3 class="text-xl font-semibold text-gray-800">常见敏感词库</h3>
                        <p class="text-sm text-gray-500 mt-1">共 <span id="totalWordCount">0</span> 个敏感词，分为 <span id="categoryCount">0</span> 个分类</p>
                    </div>
                    <button 
                        id="closeModalBtn" 
                        class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                
                <div class="p-6 border-b border-gray-200">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="searchSensitiveWords" 
                            class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                            placeholder="搜索敏感词..."
                        >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-6" id="modalContent">
                    <div class="flex items-center justify-center h-32">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-primary-600 border-t-transparent"></div>
                    </div>
                </div>
                
                <div class="p-6 border-t border-gray-200 bg-gray-50 rounded-b-xl">
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-gray-500">提示：点击敏感词可快速添加到自定义敏感词</p>
                        <button 
                            id="closeModalBtn2" 
                            class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium rounded-lg transition-colors"
                        >
                            关闭
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
