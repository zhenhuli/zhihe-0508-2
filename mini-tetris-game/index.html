<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俄罗斯方块游戏</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1 class="game-title">俄罗斯方块</h1>
    </div>
    
    <div class="game-main">
      <div class="game-info-left">
        <div class="next-piece-panel">
          <h3>下一个</h3>
          <canvas id="nextPieceCanvas" width="120" height="120"></canvas>
        </div>
        
        <div class="level-panel">
          <div class="level-label">关卡</div>
          <div class="level-value" id="level">1</div>
        </div>
        
        <div class="lines-panel">
          <div class="lines-label">消除行数</div>
          <div class="lines-value" id="lines">0</div>
        </div>
      </div>
      
      <div class="game-board-container">
        <canvas id="gameCanvas" width="240" height="480"></canvas>
      </div>
      
      <div class="game-info-right">
        <div class="score-panel">
          <div class="score-label">分数</div>
          <div class="score-value" id="score">0</div>
        </div>
        
        <div class="high-score-panel">
          <div class="high-score-label">最高分</div>
          <div class="high-score-value" id="highScore">0</div>
        </div>
        
        <div class="history-panel">
          <div class="history-header">
            <h3>历史记录</h3>
            <button id="clearHistoryBtn" title="清除历史记录">✕</button>
          </div>
          <div id="historyList" class="history-list">
            <div class="no-history">暂无记录</div>
          </div>
        </div>
      </div>
    </div>

    <div class="game-status" id="status">按空格键开始游戏</div>

    <div class="difficulty-selector">
      <label for="difficulty">难度:</label>
      <select id="difficulty">
        <option value="easy">简单</option>
        <option value="medium" selected>中等</option>
        <option value="hard">困难</option>
        <option value="expert">专家</option>
      </select>
    </div>

    <div class="game-buttons">
      <button id="startBtn">开始</button>
      <button id="pauseBtn">暂停</button>
      <button id="restartBtn">重新开始</button>
    </div>

    <div class="controls-info">
      <p>← → 左右移动</p>
      <p>↑ 旋转方块</p>
      <p>↓ 加速下落</p>
      <p>空格键 暂停/继续</p>
    </div>

    <div class="mobile-controls" id="mobileControls">
      <div class="mobile-btn-row">
        <button class="mobile-btn" id="mobileRotate">↻</button>
      </div>
      <div class="mobile-btn-row">
        <button class="mobile-btn" id="mobileLeft">←</button>
        <button class="mobile-btn" id="mobileDown">↓</button>
        <button class="mobile-btn" id="mobileRight">→</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
